apiVersion: cloud.google.com/v1
kind: ComputeClass
metadata:
  name: spot-fallback-demo
spec:
  nodePoolAutoCreation:
    enabled: true
  # Priorities define the fallback order. Higher score is higher priority.
  priorities:
  - machineType: e2-standard-2
    spot: true

  - machineType: e2-standard-2
    spot: false
    
  - machineType: n2-standard-2
    spot: false
  # Behavior when no priority rule can be satisfied.
  # ScaleUpAnyway: GKE will try to provision nodes anyway, potentially outside the defined types.
  # DoNotScaleUp: Pods will remain Pending if no defined option is available.
  whenUnsatisfiable: ScaleUpAnyway
